spring.application.name=backend
server.port=${APP_PORT:8080}

# Database connection using environment variables (fallback to localhost for easy local run if needed)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:civicpulse}
spring.datasource.username=${DB_USER:civicuser}
spring.datasource.password=${DB_PASSWORD:postgres}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:8R7K6T5P4M3X2V1L9H9Y8B7D6C5A4F3G2J1M0Q9W8E7R6T5Y4U3I2O1P0X9C8V7}
