<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register - UrbanIssues</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <script src="css/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-surface text-on-surface antialiased flex items-center justify-center min-h-screen">
    <div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_12px_32px_rgba(25,28,29,0.06)] w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-primary font-headline tracking-tight">Join UrbanIssues</h1>
            <p class="text-on-surface-variant font-label text-sm mt-2">Help improve your city.</p>
        </div>
        
        <form id="registerForm" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-on-surface font-label">Full Name</label>
                <input id="name" type="text" class="w-full px-4 py-3 bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary/40 outline-none" required placeholder="Jane Doe" />
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-on-surface font-label">Email</label>
                <input id="email" type="email" class="w-full px-4 py-3 bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary/40 outline-none" required placeholder="citizen@civicpulse.com" />
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-on-surface font-label">Password</label>
                <input id="password" type="password" class="w-full px-4 py-3 bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary/40 outline-none" required placeholder="••••••••" />
            </div>
            <button type="submit" class="w-full btn-primary-gradient text-white py-3 rounded-lg font-bold shadow-sm hover:opacity-90 transition-opacity">
                Create Account
            </button>
            <div class="text-center text-sm font-label text-slate-500 mt-4">
                Already have an account? <a href="login.html" class="text-primary font-semibold hover:underline">Sign In</a>
            </div>
        </form>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
